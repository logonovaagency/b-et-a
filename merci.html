<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111111" />
  <title>Message envoyé | B&A</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="hero-section" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;">
    
    <div class="hero-overlay" aria-hidden="true"></div>
    <div class="hero-grain" aria-hidden="true"></div>

    <div class="hero-content">
      <div class="hero-tag">
        <span class="tag-dot" aria-hidden="true"></span>
        <span>Transmission réussie</span>
      </div>

      <h1 class="hero-title" style="font-size: clamp(3rem, 8vw, 6rem);">
        <span class="title-letter">M</span>erci <span class="title-ampersand">!</span>
      </h1>

      <p class="hero-description" style="margin-bottom: var(--space-8);">
        Votre message a bien été transmis à l'équipe B&A.<br />
        Nous lisons chaque demande avec attention et reviendrons vers vous très vite.
      </p>

      <a href="/index.html" class="cta-button">
        <span class="cta-text">Retour au portfolio</span>
      </a>
    </div>

  </section>
